config-service:
  configService:
    kafka:
      enabled: false
      tlsUserSecret: ""
      tlsTruststoreSecret: ""

schema-service:
  schemaService:
    image:
      repository: harnesssecure/schema-service-signed
      tagOverride: "0.13.10"
    kafka:
      enabled: false
      tlsUserSecret: ""
      tlsTruststoreSecret: ""

onboarding-service:
  onboardingService:
    image:
      repository: harnesssecure/onboarding-service-signed
      tagOverride: "0.8.180"
    kafka:
      enabled: false
      tlsUserSecret: ""
      tlsTruststoreSecret: ""

query-service:
  queryService:
    image:
      repository: harnesssecure/query-service-signed
      tagOverride: "0.53.8"
    serviceAccount:
      name: "default"
    connectionSecrets: []
    appConfig:
      queryService:
        kafka:
          enabled: false
          tlsUserSecret: ""
          tlsTruststoreSecret: ""
        data:
          connections: []

dashboard-ui:
  image:
    repository: harnesssecure/dashboard-ui-signed
    tagOverride: "1.17.7"

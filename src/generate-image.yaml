global:
  monitoring:
    enabled: true
  database:
    clickhouse:
      enabled: true
  ngcustomdashboard:
    enabled: true
  opa:
    enabled: true
  servicediscoverymanager:
    enabled: true
  externalSecretsLoader:
    enabled: true
platform:
  bootstrap:
    networking:
      nginx:
        create: true
      defaultbackend:
        create: true
    database:
      mongodb:
        metrics:
          enabled: true
      redis:
        metrics:
          enabled: true
      timescaledb:
        prometheus:
          enabled: true
      postgresql:
        metrics:
          enabled: true

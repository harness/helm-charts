---
suite: test horizontal pod autoscaler
templates:
  - hpa.yaml
set:
  autoscaling.enabled: true
  nameOverride: my-chart-name
release:
  name: harness-smp
  namespace: harness-smp
tests:
  - it: should not template when autoscaling is disabled
    set:
      autoscaling.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should template without any override
    asserts:
      - notFailedTemplate: {}
      - isKind:
          of: HorizontalPodAutoscaler
      - equal:
          path: metadata.namespace
          value: harness-smp

  - it: should work with common annotations
    set:
      global.commonAnnotations: {foo: bar, hello: world}
    asserts:
      - isSubset:
          path: metadata.annotations
          content:
            foo: bar
            hello: world

  - it: should work with common labels
    set:
      global.commonLabels: {foo: bar, hello: world}
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            foo: bar
            hello: world

  - it: should work with common annotations and labels
    set:
      global.commonAnnotations: {foo: bar, hello: world}
      global.commonLabels: {foo: bar, hello: world}
    asserts:
      - isSubset:
          path: metadata.annotations
          content:
            foo: bar
            hello: world
      - isSubset:
          path: metadata.labels
          content:
            foo: bar
            hello: world

  - it: should validate that selectorLabels are added to the metadata.labels
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            app.kubernetes.io/name: my-chart-name
            app.kubernetes.io/instance: harness-smp
            app.kubernetes.io/managed-by: Helm

  # TODO: Add Deployment or STS
  # TODO: Add match for spec.scaleTargetRef.name with metadata.name
  - it: should validate target ref is present
    asserts:
      - exists:
          path: spec.scaleTargetRef
      - equal:
           path: spec.scaleTargetRef.kind
           value: Deployment
      - exists:
          path: spec.scaleTargetRef.name
      - exists:
          path: spec.scaleTargetRef.apiVersion

  - it: validate API version for Kubernetes version 1.22.2
    set:
      global.kubeVersion: 1.22.2
    asserts:
      - equal:
          path: apiVersion
          value: autoscaling/v2beta2

  - it: validate API version for Kubernetes version 1.23.0
    set:
      global.kubeVersion: 1.23.0
    asserts:
      - equal:
          path: apiVersion
          value: autoscaling/v2

  - it: validate target CPU for Kubernetes version 1.22.2
    set:
      global.kubeVersion: 1.22.2
      autoscaling:
        targetCPU: 500m
    asserts:
      - equal:
          path: spec.metrics[0].resource.name
          value: cpu
      - equal:
          path: spec.metrics[0].resource.targetAverageUtilization
          value: 500m

  - it: validate target CPU for Kubernetes version 1.23.0
    set:
      global.kubeVersion: 1.23.0
      autoscaling:
        targetCPU: 500m
    asserts:
      - equal:
          path: spec.metrics[0].resource.name
          value: cpu
      - isSubset:
          path: spec.metrics[0].resource.target
          content:
            type: Utilization
            averageUtilization: 500m

  - it: validate target Memory for Kubernetes version 1.22.2
    set:
      global.kubeVersion: 1.22.2
      autoscaling:
        targetMemory: 500Mi
    asserts:
      - equal:
          path: spec.metrics[0].resource.name
          value: memory
      - equal:
          path: spec.metrics[0].resource.targetAverageUtilization
          value: 500Mi

  - it: validate target Memory for Kubernetes version 1.23.0
    set:
      global.kubeVersion: 1.23.0
      autoscaling:
        targetMemory: 500Mi
    asserts:
      - equal:
          path: spec.metrics[0].resource.name
          value: memory
      - isSubset:
          path: spec.metrics[0].resource.target
          content:
            type: Utilization
            averageUtilization: 500Mi

  - it: should work with minReplicas provided
    set:
      autoscaling.minReplicas: 2
    asserts:
      - equal:
          path: spec.minReplicas
          value: 2

  - it: should work with maxReplicas provided
    set:
      autoscaling.maxReplicas: 10
    asserts:
      - equal:
          path: spec.maxReplicas
          value: 10

  - it: should work with both maxReplicas and minReplicas provided
    set:
      autoscaling.minReplicas: 2
      autoscaling.maxReplicas: 10
    asserts:
      - equal:
          path: spec.minReplicas
          value: 2
      - equal:
          path: spec.maxReplicas
          value: 10

  - it: should work with behavior provided
    set:
      autoscaling.behavior:
        scaleDown:
          stabilizationWindowSeconds: 300
    asserts:
      - isSubset:
          path: spec.behavior
          content:
              scaleDown:
                stabilizationWindowSeconds: 300